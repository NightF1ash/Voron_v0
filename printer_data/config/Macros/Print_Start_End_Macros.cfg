#------Print Start------#
[gcode_macro PRINT_START]

gcode:
    DISPLAY_ON
    log msg="Preparing Print"
    M107
    {% set bedtemp = params.BED|int %}
    {% set hotendtemp = params.EXTRUDER|int %}
    {% set chamber_temp_min = params.CHAMBER_min|default(0)|int %}
    
    _SET_MPC_MATERIAL MATERIAL={params.MATERIAL}
    
    M140 S{bedtemp}
    M104 S{hotendtemp}
    log msg="Homing"
    G28                            ; home all axes
    G90                            ; absolute positioning    
    
  {% if relative_extruder|lower == 'true' %} ;ensures extruder is in absolute mode
    M83 ;Set extruder to relative mode
  {% else %}
    M82 ;Set extruder to absolute mode
  {% endif %}
    
  {% if chamber_temp_min > 0 and not printer["heater_generic chamber"].temperature >= chamber_temp_min|float%} ;triggers heatsoak if chamber_temp is requested and not above the minimum
    Heatsoak
    M117 Waiting for Chamber
    RESPOND PREFIX=🔥 MSG="Waiting for chamber to reach: {chamber_temp_min}"
    M191 S{chamber_temp_min}
    RESPOND PREFIX=✅ MSG="Chamber now at {chamber_temp_min}"
  {% else %}
    G1 Z20 F3000                   ; move nozzle away from bed
    G1 X60 Y60 F3000
  {% endif %}
  
    M117 Heating Nozzle & Bed
    RESPOND PREFIX=🔥 MSG="Waiting for Nozzle & Bed to heat"
    M190 S{bedtemp}
    M109 S{hotendtemp}
    RESPOND PREFIX=✅ MSG="Nozzle & Bed heated"
    
    RESPOND PREFIX=🔁 MSG="Purging Nozzle"
    SQUIGGLY_PURGE PURGE_LENGTH=50 LINE_MARGIN=15
    RESPOND PREFIX=✅ MSG="Nozzle Purged"
    
    RESPOND PREFIX=🏎️ MSG="3, 2, 1.. GO!"
    M117 Printing...
    
#------Print End------#
[gcode_macro PRINT_END]

gcode:
    log msg="Job Done"
    M400                           ; wait for buffer to clear
    G92 E0                         ; zero the extruder
    G1 E-4.0 F3600                 ; retract filament
    G91                            ; relative positioning
    _RESET_SPEED                   ; Reset all Speeds and Accels to defaults
    
    #   Get Boundaries
    {% set max_x = printer.configfile.config["stepper_x"]["position_max"]|float %}
    {% set max_y = printer.configfile.config["stepper_y"]["position_max"]|float %}
    {% set max_z = printer.configfile.config["stepper_z"]["position_max"]|float %}

    #   Check end position to determine safe direction to move
    {% if printer.toolhead.position.x < (max_x - 20) %}
        {% set x_safe = 20.0 %}
    {% else %}
        {% set x_safe = -20.0 %}
    {% endif %}

    {% if printer.toolhead.position.y < (max_y - 20) %}
        {% set y_safe = 20.0 %}
    {% else %}
        {% set y_safe = -20.0 %}
    {% endif %}

    {% if printer.toolhead.position.z < (max_z - 5) %}
        {% set z_safe = 5.0 %}
    {% else %}
        {% set z_safe = max_z - printer.toolhead.position.z %}
    {% endif %}

    G0 Z{z_safe} F3600             ; move nozzle up
    G0 X{x_safe} Y{y_safe} F20000  ; move nozzle to remove stringing
    TURN_OFF_HEATERS
    M107                           ; turn off fan
    G90                            ; absolute positioning
    G0 X110 Y{max_y-10} F3600          ; park nozzle at right rear
    DISPLAY_TIMEOUT