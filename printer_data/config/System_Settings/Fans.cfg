#####################################################################
# Fan Control
#####################################################################

[heater_fan hotend_fan]
pin: thb:HE_FAN
max_power: 1
kick_start_time: 0.1
heater: extruder
heater_temp: 50.0
tachometer_pin: thb:HE_TACH
tachometer_ppr: 2
tachometer_poll_interval: 0.0008 

[fan]
pin: thb:PC_FAN
max_power: 1.0
kick_start_time: 0.5                                                # Depending on your fan, you may need to increase this value if your fan will not start
min_power: 0.13
cycle_time: 0.00004

[fan_generic ChamberFan]
pin: PA4 # Change me
cycle_time: 0.05
kick_start_time: 0.5
max_power: 1.0
